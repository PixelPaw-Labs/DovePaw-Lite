name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run fmt:check

      - name: Lint
        run: npm run lint

      - name: Test (node)
        run: npm run agents:test

      - name: Test (chatbot)
        run: npm run chatbot:test
