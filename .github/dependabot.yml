version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 20
    groups:
      dev:
        dependency-type: "development"
      claude-sdk:
        patterns:
          - "@anthropic-ai/*"
          - "@a2a-js/*"
          - "@ladybugdb/*"
      ai-elements:
        patterns:
          - "ai"
          - "streamdown"
          - "@streamdown/*"
